<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fatmax</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Courier New', Courier, monospace;
      background: #FFFDF7;
      color: #1a1a1a;
      max-width: 390px;
      margin: 0 auto;
      min-height: 100vh;
    }

    header {
      padding: 48px 20px 16px;
      border-bottom: 2px solid #1a1a1a;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
      line-height: 1;
    }

    #item-count {
      font-size: 10px;
      color: #888;
      letter-spacing: 1.5px;
      margin-top: 5px;
      text-transform: uppercase;
    }

    #new-btn {
      background: #FAB413;
      color: #000000;
      border: none;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      padding: 10px 14px;
      cursor: pointer;
      text-transform: uppercase;
    }

    #new-btn:active { opacity: 0.85; }

    .search-bar {
      padding: 10px 20px;
      border-bottom: 1px solid #e0ddd6;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .search-bar input {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      background: transparent;
      border: none;
      outline: none;
      width: 100%;
      color: #1a1a1a;
      letter-spacing: 0.5px;
    }

    .search-bar input::placeholder { color: #aaa; }

    .item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 20px;
      border-bottom: 1px solid #e8e6e0;
      cursor: pointer;
    }

    .item:active { background: #f5f3ee; }

    .thumb {
      width: 52px;
      height: 52px;
      background: #f0ede6;
      border: 1px solid #dddad2;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .item-info { flex: 1; min-width: 0; }

    .item-name {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
    }

    .item-sku {
      font-size: 10px;
      color: #888;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .chevron { color: #ccc; font-size: 20px; }

    .empty {
      padding: 60px 20px;
      text-align: center;
      font-size: 11px;
      color: #aaa;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>FATMAX</h1>
    <div id="item-count">3 items</div>
  </div>
  <button id="new-btn">+ New item</button>
</header>

<div class="search-bar">
  <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
    <circle cx="5" cy="5" r="4" stroke="#aaa" stroke-width="1.2"/>
    <path d="M8.5 8.5l2 2" stroke="#aaa" stroke-width="1.2" stroke-linecap="round"/>
  </svg>
  <input id="search" type="text" placeholder="Search by name or SKU...">
</div>

<div id="list"></div>

<script>
  const items = [
    { name: "Vintage Levi jacket", sku: "SKU-0042" },
    { name: "Nike Air Max 90",     sku: "SKU-0031" },
    { name: "Carhartt WIP trousers", sku: "SKU-0019" }
  ];

  const thumbSVG = `<svg width="18" height="18" viewBox="0 0 18 18" fill="none">
    <rect x="1" y="4" width="16" height="11" rx="1" stroke="#ccc" stroke-width="1.2"/>
    <circle cx="6" cy="8" r="1.5" stroke="#ccc" stroke-width="1"/>
    <path d="M1 13l4-3 3 2 3-2.5 4 3" stroke="#ccc" stroke-width="1" stroke-linejoin="round"/>
  </svg>`;

  function render(list) {
    const el = document.getElementById('list');
    const count = document.getElementById('item-count');
    count.textContent = list.length + ' item' + (list.length !== 1 ? 's' : '');
    if (!list.length) {
      el.innerHTML = '<div class="empty">No items found</div>';
      return;
    }
    el.innerHTML = list.map(item => `
      <div class="item">
        <div class="thumb">${thumbSVG}</div>
        <div class="item-info">
          <div class="item-name">${item.name}</div>
          <div class="item-sku">${item.sku}</div>
        </div>
        <div class="chevron">›</div>
      </div>
    `).join('');
  }

  document.getElementById('search').addEventListener('input', function() {
    const q = this.value.toLowerCase();
    render(q ? items.filter(i =>
      i.name.toLowerCase().includes(q) || i.sku.toLowerCase().includes(q)
    ) : items);
  });

  render(items);
</script>
</body>
</html>
