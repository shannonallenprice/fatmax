<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fatmax</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <div>
    <h1>FATMAX</h1>
    <div id="item-count">3 items</div>
  </div>
<button id="new-btn" onclick="window.location.href='new-item.html'">+ New item</button>
</header>

<div class="search-bar">
  <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
    <circle cx="5" cy="5" r="4" stroke="#aaa" stroke-width="1.2"/>
    <path d="M8.5 8.5l2 2" stroke="#aaa" stroke-width="1.2" stroke-linecap="round"/>
  </svg>
  <input id="search" type="text" placeholder="Search by name or SKU...">
</div>

<div id="list"></div>

<script>
const saved = JSON.parse(sessionStorage.getItem('fatmax-items') || '[]');
const defaults = [
  { name: "Vintage Levi jacket",   sku: "SKU-0042", photos: ["https://images.unsplash.com/photo-1573662073208-1f58a071c756?w=200&fit=crop"] },
  { name: "Nike Air Max 90",       sku: "SKU-0031", photos: ["https://images.unsplash.com/photo-1623816874982-aab879ea7073?w=200&fit=crop"] },
  { name: "Carhartt WIP trousers", sku: "SKU-0019", photos: ["https://images.unsplash.com/photo-1622408298915-24d322badf9e?w=200&fit=crop"] }
];
const items = saved.length ? saved : defaults;

  const thumbSVG = `<svg width="18" height="18" viewBox="0 0 18 18" fill="none">
    <rect x="1" y="4" width="16" height="11" rx="1" stroke="#ccc" stroke-width="1.2"/>
    <circle cx="6" cy="8" r="1.5" stroke="#ccc" stroke-width="1"/>
    <path d="M1 13l4-3 3 2 3-2.5 4 3" stroke="#ccc" stroke-width="1" stroke-linejoin="round"/>
  </svg>`;

  function render(list) {
    const el = document.getElementById('list');
    const count = document.getElementById('item-count');
    count.textContent = list.length + ' item' + (list.length !== 1 ? 's' : '');
    if (!list.length) {
      el.innerHTML = '<div class="empty">No items found</div>';
      return;
    }
    el.innerHTML = list.map((item, i) => `
  <div class="item" onclick="window.location.href='item.html?index=${i}'">
    <div class="thumb">${item.thumbnail ? `<img src="${item.thumbnail}" style="width:100%;height:100%;object-fit:cover"/>` : thumbSVG}</div>
    <div class="item-info">
      <div class="item-name">${item.name}</div>
      <div class="item-sku">${item.sku}</div>
    </div>
    <div class="chevron">›</div>
  </div>
`).join('');
  }

  document.getElementById('search').addEventListener('input', function() {
    const q = this.value.toLowerCase();
    render(q ? items.filter(i =>
      i.name.toLowerCase().includes(q) || i.sku.toLowerCase().includes(q)
    ) : items);
  });

  render(items);
</script>
</body>
</html>
