<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fatmax — Item</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Courier New', Courier, monospace;
      background: #FFFDF7;
      color: #1a1a1a;
      max-width: 390px;
      margin: 0 auto;
      min-height: 100vh;
    }

    header {
      padding: 48px 20px 16px;
      border-bottom: 2px solid #1a1a1a;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .back-btn {
      background: none;
      border: none;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: #888;
      cursor: pointer;
      letter-spacing: 1px;
      padding: 4px 0;
      flex-shrink: 0;
    }

    .header-info { flex: 1; min-width: 0; padding-right: 12px; }

    /* ── Inline editing ── */
    .editable-name {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.5px;
      border: none;
      border-bottom: 1.5px solid transparent;
      background: transparent;
      font-family: 'Courier New', monospace;
      color: #1a1a1a;
      width: 100%;
      outline: none;
      padding: 2px 0;
    }

    .editable-name:focus {
      border-bottom-color: #FAB413;
    }

    .editable-sku {
      font-size: 10px;
      color: #888;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      border: none;
      border-bottom: 1.5px solid transparent;
      background: transparent;
      font-family: 'Courier New', monospace;
      width: 100%;
      outline: none;
      margin-top: 5px;
      padding: 2px 0;
    }

    .editable-sku:focus {
      border-bottom-color: #FAB413;
      color: #1a1a1a;
    }

    .save-indicator {
      font-size: 9px;
      color: #FAB413;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 4px;
      height: 12px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .save-indicator.visible { opacity: 1; }

    /* ── Photo grid ── */
    .section-label {
      font-size: 10px;
      color: #888;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 16px 20px 10px;
      border-bottom: 1px solid #e0ddd6;
    }

    .photo-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2px;
      padding: 2px;
      background: #e0ddd6;
    }

    .photo-cell {
      aspect-ratio: 1;
      background: #f0ede6;
      overflow: hidden;
      cursor: pointer;
      position: relative;
    }

    .photo-cell img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 0.15s;
    }

    .photo-cell:active img { opacity: 0.8; }

    .photo-cell-empty {
      aspect-ratio: 1;
      background: #f5f3ee;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .no-photos {
      padding: 40px 20px;
      text-align: center;
      font-size: 10px;
      color: #aaa;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      border-bottom: 1px solid #e0ddd6;
    }

    /* ── Lightbox ── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 100;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    .lightbox.open { display: flex; }

    .lightbox img {
      max-width: 100%;
      max-height: 85vh;
      object-fit: contain;
    }

    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 20px;
      background: none;
      border: none;
      color: #fff;
      font-size: 24px;
      cursor: pointer;
      font-family: 'Courier New', monospace;
    }

    .lightbox-counter {
      color: #888;
      font-size: 11px;
      letter-spacing: 1.5px;
      margin-top: 12px;
    }

    /* ── Measurements ── */
    .measurements-section { padding: 0 0 80px; }

    .measurement-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 13px 20px;
      border-bottom: 1px solid #e8e6e0;
    }

    .measurement-label {
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .measurement-value {
      font-size: 13px;
      font-weight: 600;
      color: #1a1a1a;
    }

    .measurement-empty {
      padding: 32px 20px;
      font-size: 10px;
      color: #aaa;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      text-align: center;
    }

    .btn-measure {
      display: block;
      margin: 16px 20px 0;
      background: #FAB413;
      color: #000;
      border: none;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      padding: 14px;
      cursor: pointer;
      text-transform: uppercase;
      width: calc(100% - 40px);
    }

    .btn-measure:active { opacity: 0.85; }

    /* ── Delete ── */
    .delete-area {
      padding: 24px 20px 48px;
      border-top: 1px solid #e0ddd6;
    }

    .btn-delete {
      background: transparent;
      color: #FF2800;
      border: 1.5px solid #FF2800;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      padding: 14px;
      cursor: pointer;
      text-transform: uppercase;
      width: 100%;
    }

    .btn-delete:active { background: #fff0ee; }
  </style>
</head>
<body>

<header>
  <div class="header-info">
    <input class="editable-name" id="item-name" type="text" value=""/>
    <input class="editable-sku" id="item-sku" type="text" value=""/>
    <div class="save-indicator" id="save-indicator">Saved</div>
  </div>
  <button class="back-btn" onclick="window.location.href='index.html'">← Back</button>
</header>

<!-- Photos -->
<div class="section-label" id="photo-label">Photos</div>
<div id="photo-grid"></div>

<!-- Measurements -->
<div class="section-label">Measurements</div>
<div class="measurements-section">
  <div class="measurement-empty" id="measure-empty">No measurements yet</div>
  <div id="measurements-list"></div>
  <button class="btn-measure" onclick="startMeasure()">+ Take measurement</button>
</div>

<!-- Delete -->
<div class="delete-area">
  <button class="btn-delete" onclick="deleteItem()">Delete item</button>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">×</button>
  <img id="lightbox-img" alt="full photo"/>
  <div class="lightbox-counter" id="lightbox-counter"></div>
</div>

<script>
  // ── Load item from sessionStorage ──
  var params = new URLSearchParams(window.location.search);
  var index = parseInt(params.get('index'));
  var defaultItems = [
    { name: "Vintage Levi jacket", sku: "SKU-0042", thumbnail: null, photos: [], measurements: [] },
    { name: "Nike Air Max 90",     sku: "SKU-0031", thumbnail: null, photos: [], measurements: [] },
    { name: "Carhartt WIP trousers", sku: "SKU-0019", thumbnail: null, photos: [], measurements: [] }
  ];
  var items = JSON.parse(sessionStorage.getItem('fatmax-items') || 'null') || defaultItems;
  var item = items[index];

  if (!item) {
    window.location.href = 'index.html';
  }

  // ── Populate header ──
  document.getElementById('item-name').value = item.name;
  document.getElementById('item-sku').value = item.sku;

  // ── Inline save on edit ──
  var saveTimer;
  function scheduleAutoSave() {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(function() {
      item.name = document.getElementById('item-name').value.trim();
      item.sku = document.getElementById('item-sku').value.trim();
      items[index] = item;
      sessionStorage.setItem('fatmax-items', JSON.stringify(items));
      var ind = document.getElementById('save-indicator');
      ind.classList.add('visible');
      setTimeout(function() { ind.classList.remove('visible'); }, 1500);
    }, 600);
  }

  document.getElementById('item-name').addEventListener('input', scheduleAutoSave);
  document.getElementById('item-sku').addEventListener('input', scheduleAutoSave);

  // ── Photo grid ──
  var photos = item.photos || [];
  if (item.thumbnail && photos.length === 0) photos = [item.thumbnail];

  var photoLabel = document.getElementById('photo-label');
  photoLabel.textContent = 'Photos (' + photos.length + ')';

var grid = document.getElementById('photo-grid');
if (photos.length === 0) {
  grid.innerHTML = '<div class="no-photos">No photos</div>';
} else {
  var cells = photos.slice();
  if (cells.length % 2 !== 0) cells.push(null);
  grid.className = 'photo-grid';
  grid.innerHTML = cells.map(function(src, i) {
    if (!src) return '<div class="photo-cell-empty"></div>';
    return '<div class="photo-cell" onclick="openLightbox(' + i + ')">'
      + '<img src="' + src + '" alt="photo ' + (i+1) + '"/>'
      + '</div>';
  }).join('');
}

  // ── Lightbox ──
  var lightboxIndex = 0;
  function openLightbox(i) {
    lightboxIndex = i;
    document.getElementById('lightbox-img').src = photos[i];
    document.getElementById('lightbox-counter').textContent =
      (i + 1) + ' / ' + photos.length;
    document.getElementById('lightbox').classList.add('open');
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
  }

  // swipe to close lightbox
  document.getElementById('lightbox').addEventListener('click', function(e) {
    if (e.target === this) closeLightbox();
  });

  // ── Measurements ──
  var measurements = item.measurements || [];
  var measureEmpty = document.getElementById('measure-empty');
  var measureList = document.getElementById('measurements-list');

  if (measurements.length > 0) {
    measureEmpty.style.display = 'none';
    measureList.innerHTML = measurements.map(function(m) {
      return '<div class="measurement-row">'
        + '<div class="measurement-label">' + m.label + '</div>'
        + '<div class="measurement-value">' + m.value + '</div>'
        + '</div>';
    }).join('');
  }

function startMeasure() {
  window.location.href = 'measure.html?index=' + index;
}

  // ── Delete ──
  function deleteItem() {
    if (!confirm('Delete ' + item.name + '? This cannot be undone.')) return;
    items.splice(index, 1);
    sessionStorage.setItem('fatmax-items', JSON.stringify(items));
    window.location.href = 'index.html';
  }
</script>
</body>
</html>
