<!DOCTYPE html>
<html lang="en">
<head>
  <script src="supabase.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fatmax — Log In</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Courier New', Courier, monospace;
      background: #FFFDF7;
      color: #1a1a1a;
      max-width: 390px;
      margin: 0 auto;
      min-height: 100vh;
    }

    header {
      padding: 48px 20px 16px;
      border-bottom: 2px solid #1a1a1a;
    }

    h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; line-height: 1; }

    .sub {
      font-size: 10px;
      color: #888;
      letter-spacing: 1.5px;
      margin-top: 5px;
      text-transform: uppercase;
    }

    .form-wrap { padding: 32px 20px 0; }

    .field-label {
      font-size: 10px;
      color: #888;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .field-input {
      font-family: 'Courier New', monospace;
      font-size: 14px;
      background: transparent;
      border: none;
      border-bottom: 1.5px solid #1a1a1a;
      outline: none;
      width: 100%;
      padding: 8px 0;
      color: #1a1a1a;
    }

    .field-input::placeholder { color: #ccc; }
    .field-input:focus { border-bottom-color: #FAB413; }

    .btn-primary {
      background: #FAB413;
      color: #000000;
      border: none;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      padding: 14px;
      cursor: pointer;
      text-transform: uppercase;
      width: 100%;
      margin-top: 32px;
    }

    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary:not(:disabled):active { opacity: 0.85; }

    .error-msg {
      font-size: 11px;
      color: #FF2800;
      letter-spacing: 0.5px;
      margin-top: 14px;
      display: none;
    }

    /* ── Confirmation state ── */
    #confirm-state { display: none; padding: 40px 20px 0; }

    .confirm-icon {
      width: 48px;
      height: 48px;
      border: 2px solid #FAB413;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }

    .confirm-title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 10px;
    }

    .confirm-body {
      font-size: 12px;
      color: #555;
      line-height: 1.7;
      letter-spacing: 0.3px;
    }

    .confirm-email {
      font-weight: 700;
      color: #1a1a1a;
    }

    .signup-link {
      display: block;
      text-align: center;
      font-size: 10px;
      color: #888;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-decoration: none;
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid #e0ddd6;
    }

    .signup-link:active { color: #1a1a1a; }
  </style>
</head>
<body>

<header>
  <h1>FATMAX</h1>
  <div class="sub">Log in</div>
</header>

<!-- Login form -->
<div id="form-state">
  <div class="form-wrap">
    <div class="field-label">Email address</div>
    <input
      class="field-input"
      id="email-input"
      type="email"
      placeholder="you@example.com"
      autocomplete="email"
      autocapitalize="none"
    />
    <div class="error-msg" id="error-msg"></div>
    <button class="btn-primary" id="submit-btn" onclick="handleLogin()">
      Send magic link
    </button>
  </div>
  <a class="signup-link" href="signup.html">No account yet? Sign up</a>
</div>

<!-- Confirmation message -->
<div id="confirm-state">
  <div class="confirm-icon">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
      <polyline points="4,11 9,16 18,6" stroke="#FAB413" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <div class="confirm-title">Check your email</div>
  <div class="confirm-body">
    We sent a magic link to <span class="confirm-email" id="confirm-email"></span>.
    Click the link to log in — no password needed.
  </div>
</div>

<script>
  async function handleLogin() {
    var email = document.getElementById('email-input').value.trim();
    var errorEl = document.getElementById('error-msg');
    var btn = document.getElementById('submit-btn');

    errorEl.style.display = 'none';

    if (!email || !email.includes('@')) {
      showError('Please enter a valid email address.');
      return;
    }

    btn.textContent = 'Sending...';
    btn.disabled = true;

    try {
      var res = await fetch(SUPABASE_URL + '/auth/v1/otp', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_ANON_KEY
        },
        body: JSON.stringify({ email: email, create_user: false })
      });

      if (!res.ok) {
        var data = await res.json();
        throw new Error(data.msg || data.message || 'Something went wrong.');
      }

      document.getElementById('confirm-email').textContent = email;
      document.getElementById('form-state').style.display = 'none';
      document.getElementById('confirm-state').style.display = 'block';

    } catch (err) {
      showError(err.message);
      btn.textContent = 'Send magic link';
      btn.disabled = false;
    }
  }

  function showError(msg) {
    var el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
  }

  document.getElementById('email-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') handleLogin();
  });
</script>
</body>
</html>
